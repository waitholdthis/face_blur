# Base/service images are overridable via env for registry-mirror environments,
# e.g. POSTGRES_IMAGE=mirror.gcr.io/pgvector/pgvector:pg16 (see .env.example).
services:
  db:
    image: ${POSTGRES_IMAGE:-pgvector/pgvector:pg16}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-anonymization_vault}
    # Bound to loopback: only host-local tools may connect; services use the
    # compose network. Docker published ports bypass ufw, so never expose these.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${PYTHON_IMAGE:-python:3.11-slim}
    restart: unless-stopped
    # Set BIND_IP=127.0.0.1 in .env when a reverse proxy (Caddy) runs on the
    # same host, so plain HTTP is never reachable from outside.
    ports:
      - "${BIND_IP:-0.0.0.0}:8000:8000"
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-anonymization_vault}
      REDIS_URL: redis://redis:6379/0
      CELERY_TASK_ALWAYS_EAGER: "false"
      STORAGE_BACKEND: local
      STORAGE_LOCAL_DIR: /data/storage
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-please-32chars-min}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    volumes:
      - media-storage:/data/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
      args:
        BASE_IMAGE: ${PYTHON_IMAGE:-python:3.11-slim}
    restart: unless-stopped
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-anonymization_vault}
      REDIS_URL: redis://redis:6379/0
      CELERY_TASK_ALWAYS_EAGER: "false"
      STORAGE_BACKEND: local
      STORAGE_LOCAL_DIR: /data/storage
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-please-32chars-min}
    volumes:
      - media-storage:/data/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${NODE_IMAGE:-node:22-alpine}
        NEXT_PUBLIC_API_BASE: ${PUBLIC_BASE_URL:-http://localhost:8000}
        NEXT_PUBLIC_SHOW_DEMO_LOGIN: ${NEXT_PUBLIC_SHOW_DEMO_LOGIN:-0}
    restart: unless-stopped
    ports:
      - "${BIND_IP:-0.0.0.0}:3000:3000"
    depends_on:
      - api

volumes:
  postgres-data:
  media-storage:
